name: Release

on:
  workflow_dispatch:
    inputs:
      publish_root_alias:
        description: Publish the optional unscoped dockerforge alias package
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run verify
      - run: npm publish -w @dockerforge/core --provenance
      - run: npm publish -w @dockerforge/cli --provenance
      - if: ${{ inputs.publish_root_alias }}
        run: npm publish --provenance
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"
          NOTES="docs/release-notes/${TAG}.md"

          if [ ! -f "$NOTES" ]; then
            echo "Missing release notes: $NOTES" >&2
            exit 1
          fi

          if ! git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "DockerForge ${TAG}" --notes-file "$NOTES" --latest
          else
            gh release create "$TAG" --title "DockerForge ${TAG}" --notes-file "$NOTES" --latest
          fi
